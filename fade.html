<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fade html</title>
</head>

<style>

    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;  
        flex-direction: column;     
        gap: 10px; 
    }
    .box1,.box2,.box3,.box4{
        width: 100px;
        height: 100px;
        background-color: aqua;
        border: 1px solid black;
        display: none;
    }
</style>

<body>
    <h1>This is for fade events</h1>
    <button id="butIN">box fadeIn</button>
    <button id="butOUT">box fadeOut</button>
    <button id="butToggle">box fadeToggle</button>
    <button id="butTo">box fadeTo</button>
    <div class="box1" style="background-color: aquamarine;"></div>
    <div class="box2" style="background-color: red;"></div>
    <div class="box3" style="background-color: blanchedalmond"></div>
    <div class="box4" style="background-color:turquoise"></div>
    
</body>
<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
<script src="js/fade.js"></script>
</html>
