<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slide html</title>
</head>

<style>

    body{
        height: 100vh;
        margin: 10px; 
    }
    
    .box1,.box2,.box3,.box4{
        margin: 10px;
        width: 200px;
        height: 200px;
        background-color: aquamarine;
        border: 1px solid aliceblue;
        position: relative;
    }
   
</style>

<body>
    <h1 id="Heading">This is a animation</h1>
    <button id="butAni">Click for Animation</button>
    <div class="box1" style="background-color: aquamarine;"></div>

    <button id="butAni2">Click for Animation</button>
    <div class="box2" style="background-color: bisque;"></div>

    <button id="butAni3">Click for Animation</button>
    <div class="box3" style="background-color: fuchsia;height:100px;width:100px;position:absolute;"></div>
    
    <br><br><br><br><br><br><br><br><br>
    
    <button id="butAni4">Click for Animation</button>
    <div class="box4" style="background-color: sandybrown;height:100px;width:100px;position:absolute;"></div>
</body>
<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
<script src="js/animate.js"></script>
</html>
